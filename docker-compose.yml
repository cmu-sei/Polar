# Polar dev — with mTLS Neo4j for debugging kube-consumer graph connection
services:
  neo4j:
    image: neo4j:5.26.2
    user: "7474:7474"
    # command:
    #   - sleep
    #   - infinity
    environment:
      - NEO4J_AUTH=neo4j/somepassword
      - NEO4J_dbms_ssl_policy_bolt_enabled=true
      - NEO4J_dbms_ssl_policy_bolt_base__directory=/var/lib/neo4j/certificates/bolt
      - NEO4J_dbms_ssl_policy_bolt_private__key=private.key
      - NEO4J_dbms_ssl_policy_bolt_public__certificate=public.crt
      - NEO4J_dbms_ssl_policy_bolt_client__auth=REQUIRE
      - NEO4J_dbms_ssl_policy_https_enabled=true
      - NEO4J_dbms_ssl_policy_https_base__directory=/var/lib/neo4j/certificates/https
      - NEO4J_dbms_ssl_policy_https_private__key=private.key
      - NEO4J_dbms_ssl_policy_https_public__certificate=public.crt
      - NEO4J_dbms_ssl_policy_https_client__auth=REQUIRE
      - NEO4J_dbms_connector_bolt_tls__level=REQUIRED
      - NEO4J_server_jvm_additional=-Djavax.net.debug=ssl:handshake

    volumes:
      - neo4j-data:/var/lib/neo4j/data
      - neo4j-logs:/var/lib/neo4j/logs
      - ./src/agents/dev/certs/neo4j:/var/lib/neo4j/certificates

    networks:
      - polar
    ports:
      - "7474:7474"
      - "7473:7473"
      - "7687:7687"

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.11.0
    ports:
      - 16686:16686
      - 4317:4317
      - 4318:4318
    networks:
      - polar
    environment:
      - COLLECTOR_OTLP_ENABLED=true

networks:
  polar:

volumes:
  neo4j-data:
  neo4j-logs:
