---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: cyclops-dev
  name: cyclops-dev
---
apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: minio
  name: minio-credentials
  namespace: cyclops-dev
stringData:
  root-password: minio123
  root-user: minio
type: Opaque
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: minio
  name: minio-data
  namespace: cyclops-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: "10Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: minio
  name: minio
  namespace: cyclops-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: cyclops-dev
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: cyclops-dev
        app.kubernetes.io/name: minio
    spec:
      containers:
        - command:
            - minio
            - server
            - /data
            - "--console-address"
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  key: root-user
                  name: minio-credentials
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: root-password
                  name: minio-credentials
          image: minio/minio:RELEASE.2025-02-28T09-55-16Z
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
          name: minio
          ports:
            - containerPort: 9000
              name: s3-api
            - containerPort: 9001
              name: console
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: minio
  name: minio
  namespace: cyclops-dev
spec:
  ports:
    - name: s3-api
      nodePort: 30900
      port: 9000
      targetPort: 9000
    - name: console
      nodePort: 30901
      port: 9001
      targetPort: 9001
  selector:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: minio
  type: NodePort
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: registry
  name: registry-data
  namespace: cyclops-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: "20Gi"
---
apiVersion: v1
data:
  config.yml: |
    version: 0.1
    
    log:
      level: info
      formatter: json
    
    storage:
      filesystem:
        rootdirectory: /var/lib/registry
      delete:
        enabled: true
      cache:
        blobdescriptor: inmemory
    
    http:
      addr: :5000
      headers:
        X-Content-Type-Options: [nosniff]
    
    health:
      storagedriver:
        enabled: false
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: registry
  name: registry-config
  namespace: cyclops-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: registry
  name: registry
  namespace: cyclops-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/managed-by: cyclops-dev
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: cyclops-dev
        app.kubernetes.io/name: registry
    spec:
      containers:
        - image: registry:2.8.3
          name: registry
          ports:
            - containerPort: 5000
              name: registry
          readinessProbe:
            httpGet:
              path: /v2/
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - mountPath: /etc/docker/registry
              name: config
              readOnly: true
            - mountPath: /var/lib/registry
              name: data
      volumes:
        - configMap:
            name: registry-config
          name: config
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: registry
  name: registry
  namespace: cyclops-dev
spec:
  ports:
    - name: registry
      nodePort: 30500
      port: 5000
      targetPort: 5000
  selector:
    app.kubernetes.io/managed-by: cyclops-dev
    app.kubernetes.io/name: registry
  type: NodePort
