backend:
  driver: kubernetes
  kubernetes:
    job_labels:
      cyclops.io/env: dev
    namespace: default
    resources:
      cpu_limit: '2'
      cpu_request: "500m"
      memory_limit: "4Gi"
      memory_request: "512Mi"
bootstrap:
  builder_image: docker.io/nixos/nix:2.24.1
  container_config_ref: container.dhall
  target_registry: localhost:5000/cyclops/builds
cassini:
  broker_url: cassini://localhost:7400
  inbound_subject: cyclops.build.requested
credentials:
  git_secret_name: cyclops-git-credentials
  registry_secret_name: cyclops-registry-credentials
log:
  format: pretty
  level: "cyclops=debug,warn"
repo_mappings:
  - pipeline_image: rust:latest
    repo_url: https://github.com/cmu-sei/Polar.git
storage:
  access_key: minio
  bucket: cyclops-build-artifacts
  endpoint_url: http://localhost:9000
  region: us-east-1
  secret_key: minio123
