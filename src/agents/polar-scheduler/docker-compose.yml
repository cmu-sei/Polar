# docker-compose.yml for scheduler integration tests
# Brings up Neo4j and Jaeger. Cassini broker is run natively (outside compose).

services:
  neo4j:
    image: neo4j:5-community
    container_name: scheduler-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/somepassword
      - NEO4J_PLUGINS='["apoc"]'
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    networks:
      - polar
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  jaeger:
    image: jaegertracing/jaeger:2.11.0
    container_name: scheduler-jaeger
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks:
      - polar
    environment:
      - COLLECTOR_OTLP_ENABLED=true

networks:
  polar:
    name: polar
    driver: bridge

volumes:
  neo4j-data:
  neo4j-logs:
