---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: polar-core
  namespace: flux-system
spec:
  dependsOn: []
  interval: "1m"
  path: "./core"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: polar-test
  timeout: "2m"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: polar-infra
  namespace: flux-system
spec:
  dependsOn:
    - name: polar-core
  interval: "1m"
  path: "./infra"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: polar-test
  timeout: "2m"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: polar-agents
  namespace: flux-system
spec:
  dependsOn:
    - name: polar-infra
  interval: "1m"
  path: "./agents"
  prune: true
  sourceRef:
    kind: OCIRepository
    name: polar-test
  timeout: "2m"
