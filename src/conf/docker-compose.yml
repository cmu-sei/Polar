# DM24-0470

services:
  neo4j:
    user: 7474:7474
    image: neo4j:5.26.2
    restart: never
    environment:
      - NEO4J_AUTH=neo4j/somepassword
    networks:
      - polar
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      # - ./neo4j-no-ssl.conf:/var/lib/neo4j/conf
      - ./neo4j_setup/imports:/var/lib/neo4j/import

  step-ca:
    image: smallstep/step-ca:latest
    ports:
      - 9000:9000
    environment:
      - DOCKER_STEPCA_INIT_NAME=Polar Test CA
      - DOCKER_STEPCA_INIT_DNS_NAMES=localhost
      - DOCKER_STEPCA_INIT_PROVISIONER_NAME=cert-issuer
      - DOCKER_STEPCA_INIT_PASSWORD=somepassword
    volumes:
      - /var/step:/home/step

  jaeger:
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.11.0
    ports:
      - 16686:16686
      - 4317:4317
      - 4318:4318
      - 5778:5778
      - 9411:9411
    networks:
      - polar
    environment:
      - COLLECTOR_OTLP_ENABLED=true

networks:
  polar:

volumes:
  neo4j-data:
